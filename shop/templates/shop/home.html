{% extends "base/base.html" %}

{% block main %}
<div class="contentWrapper">
    <div class="hero">
        <h1 class="heroTitle">{{home.hero_title}}</h1>
        <h3 class="heroSubtitle">{{home.hero_subtitle}}</h3>
    </div>
    <div class="contentWrapperText">
        <h1 class="pageTitle">Who we are?</h1>
        <h3 class="pageSubtitle">{{home.description}}</h3>
    </div>
    <div class="contentWrapperSmall">
        <h1 class="pageTitle">Featured Movies</h1>
        <ul class="productsList">
            {% for m in top_movies %}
                <li class="productItem">
                    <h3 class="prodTitle">{{m.title}}</h3>
                    <span class="supportText">{{m.year}}</span>
                    <span class="supportText">Rating: {{m.rating}}</span>
                    <a class="btnLink" href="{% url 'product_detail' pk=m.id%}">See more</a>
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock main %}
